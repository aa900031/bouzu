name: Release

on:
  push:
    tags:
      - '\@bouzu/*\@[0-9]+\.[0-9]+\.[0-9]+*'

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  publish-npm:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup
        uses: aa900031/github-actions/setup-node@main

      - name: Build dist
        run: pnpm run build:pkgs

      - name: Update npm
        run: npm install -g npm@latest

      - name: Publish to npm
        run: pnpm run publish:pkgs
